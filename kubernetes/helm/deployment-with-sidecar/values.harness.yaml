# values.harness.yaml
# Ternary pattern: form blank -> pipeline gets "" -> ternary falls back to chart default
# Pattern: <+<+pipeline.variables.X> != "" ? <+pipeline.variables.X> : literal_default>

mainApp:
  replicaCount: <+<+pipeline.variables.psa_default_replicas> != "" ? <+pipeline.variables.psa_default_replicas> : 1>
  name: main-app
  image:
    repository: nginx
    tag: <+<+pipeline.variables.psa_default_tag> != "" ? <+pipeline.variables.psa_default_tag> : "1.25">
    pullPolicy: IfNotPresent
  port: 80
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

sidecar:
  replicaCount: <+<+pipeline.variables.psa_default_replicas> != "" ? <+pipeline.variables.psa_default_replicas> : 1>
  name: sidecar
  image:
    repository: busybox
    tag: <+<+pipeline.variables.psa_default_tag> != "" ? <+pipeline.variables.psa_default_tag> : "1.36">
    pullPolicy: IfNotPresent
  command: ["sh", "-c", "while true; do echo 'sidecar running'; sleep 30; done"]
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

service:
  type: ClusterIP
  port: 80

# Deployment metadata
deployment:
  namespace: <+<+pipeline.variables.deployment_name> != "" ? <+pipeline.variables.deployment_name> : "default">
  profile: <+<+pipeline.variables.profile> != "" ? <+pipeline.variables.profile> : "dev">
  cluster: <+<+pipeline.variables.cluster> != "" ? <+pipeline.variables.cluster> : "awsconnector">